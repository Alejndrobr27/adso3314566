<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12-Colors-Alpha</title>

    <link rel="stylesheet" href="../src/css/03-css.css">

    <style>
        figure.Crash {
            background: url(imgs/Crash.jpg) no-repeat center / contain;
            border: 4px solid #da4f05;
            margin-block: 4rem;
            margin-inline: auto;
            width: 380px;
            height: 380px;
        }

        div {
            height: calc(380px /3);

            &.box1 {
                background-color: rgba(191, 104, 66, 0.5);
            }

            &.box2 {
                background-color: rgba(184, 76, 29, 0.681);
            }

            &.box3 {
                background-color: rgba(105, 63, 44, 0.9);
            }
        }
        


        h3 {
            color: white;
        }
    </style>
</head>

<body>

    <a href="/03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256">

            <path
                d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z">
            </path>

        </svg>
    </a>

    <main>

        <header>
            <h1>12-Colors-Alpha</h1>

            <h2>
                The fourth alpha channel allows you to apply opacity or transparency to the color.
            </h2>
        </header>

        <section>

            <h3>Example Transparent Colors.</h3>

            <figure class="Crash">
                <div class="box1"></div>
                <div class="box2"></div>
                <div class="box3"></div>
            </figure>

        </section>

    </main>

</body>

</html>
