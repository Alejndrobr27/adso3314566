<!DOCTYPE html>
<html lang="en">
<style>
    .shadow {
        font-size: 48px;
        font-weight: bold;
        color: rgb(109, 61, 187);
        text-align: center;

        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }

    .shadow2 {
        font-size: 48px;
        font-weight: bold;
        color: rgb(70, 12, 163);
        text-align: center;

        text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.2), 0 0 8px rgba(255, 255, 255, 0.836);

    }

    .shadow3 {
        font-size: 48px;
        font-weight: bold;
        color: rgb(153, 161, 161);
        text-align: center;

        text-shadow: 2px 2px 4px rgb(253, 0, 0), 0 0 12px rgb(255, 255, 255);

    }

    .shadow4 {
        font-size: 48px;
        font-weight: bold;
        color: #00d9ff;
        text-align: center;

        text-shadow:
            0 0 5px #00d9ff,
            0 0 10px #00d9ff,
            0 0 20px #00d9ff,
            0 0 40px #0099ff;
    }

    .shadow5 {
        font-size: 48px;
        font-weight: bold;
        color: #ff9900;
        text-align: center;

        text-shadow:
            1px 1px 0 #cc7a00,
            2px 2px 0 #b36b00,
            3px 3px 0 #995c00,
            4px 4px 8px rgba(0, 0, 0, .5);
    }

    .shadow6 {
        font-size: 48px;
        font-weight: bold;
        color: #fff;
        text-align: center;

        text-shadow:
            0 0 5px #ff9900,
            0 0 10px #ff6600,
            0 0 20px #ff3300,
            0 0 40px #ff0000;
    }
</style>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>03-CSS</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
</head>

                d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z">
            </path>
        </svg>
    </a>
    <main>
        <header>
            <h1>30-Text-Shadow</h1>
            <h2>Adds shadows to text.


            </h2>

            <section>
                <div class="shadow">ADSO</div>
                <div class="shadow2">CPIC</div>
                <div class="shadow3">SENA</div>
                <div class="shadow4">ALEJANDRO</div>
                <div class="shadow5">BERMUDEZ</div>
                <div class="shadow6">CALDAS</div>
            </section>
        </header>
