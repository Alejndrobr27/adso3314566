<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>16-Float</title>

    <link rel="stylesheet" href="../src/css/03-css.css">

    <style>
        section {
            margin: 2rem auto;
            width: 350px;
            height: auto;
            padding: 1rem;
            border: 1px solid #ccc;
            overflow: auto; /* importante para contener float */
        }

        .floatleft img {
            float: left;

            width: 150px;
            height: auto;

            display: block;
            margin-right: 10px;
        }

        section::after {
            content: "";
            display: block;
            clear: both;
        }
    </style>

</head>

<body>

    <a href="/03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256">
            <path
                d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z">
            </path>
        </svg>
    </a>

    <main>

        <header>
            <h1>16-Float</h1>
            <h2>Pushes the element to either the left or right side.</h2>
        </header>

        <section>
            <div class="floatleft">
                <img src="imgs/Crash.jpg" alt="crash">
            </div>

            <p>
                Este es un ejemplo de un elemento flotante con imagen.
                El texto fluye alrededor de la imagen gracias a float.
            </p>
        </section>

    </main>

</body>

</html>
