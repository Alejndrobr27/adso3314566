<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>03-CSS</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
</head>
<style>
    h3 {
        color: rgb(181, 173, 189);
    }
    div#sprite {
        background: url(imgs/anim-sprite.png) no-repeat;
        height: 256px;
        width: 256px;
        margin: 1rem auto;;
    }
    div#sprite.sp1 {background-position: calc(-256px * 0) 0;}
    div#sprite.sp2 {background-position: calc(-256px * 1) 0;}
    div#sprite.sp3 {background-position: calc(-256px * 2) 0;}
    div#sprite.sp4 {background-position: calc(-256px * 3) 0;}
    div#sprite.sp5 {background-position: calc(-256px * 4) 0;}
    div#sprite.sp6 {background-position: calc(-256px * 5) 0;}

    div#goku {
        background: url(imgs/goku.png) no-repeat;
        height: 256px;
        width: 256px;
        margin: 1rem auto;;
    }
    div#goku.go1 {background-position: calc(-256px * 0) 0;}
    div#goku.go2 {background-position: calc(-256px * 1) 0;}
    div#goku.go3 {background-position: calc(-256px * 2) 0;}
    

</style>

<body>
    <a href="/03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256">
            <path
                d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z">
            </path>
        </svg>
    </a>
    <main>
        <header>
            <h1>23-Sprite</h1>
            <h2>An image sprite is a collection of images put into a single image.


            </h2>
        </header>
        <section>
            <h3>Runner</h3>
            <div id="sprite" class="sp1"></div>
            <h3>Goku</h3>
            <div id="goku" class="go1"></div>
        </section>
        <script>
            const sprite = document.getElementById('sprite');
            let currentFrame = 1;
            const totalFrames = 6;

            setInterval(() => {
                currentFrame = (currentFrame % totalFrames) + 1; // Cycle through frames
                sprite.className = `sp${currentFrame}`; // Update class to change background position
            }, 80); // Change frame every 80ms
        </script>

        <script>    
            const goku = document.getElementById('goku');
            let currentGoFrame = 1;
            const totalGoFrames = 6;

            setInterval(() => {
                currentGoFrame = (currentGoFrame % totalGoFrames) + 1; // Cycle through frames
                goku.className = `go${currentGoFrame}`; // Update class to change background position
            }, 25); // Change frame every 80ms
        </script>
