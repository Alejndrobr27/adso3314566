<!DOCTYPE html>
<html lang="en">
    <style>
        *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    font-family: Arial, Helvetica, sans-serif;
    background: #f4f4f4;
}

main{
    width: 90%;
    max-width: 1000px;
    margin: 40px auto;
}

header{
    text-align: center;
    margin-bottom: 30px;
}

.gallery{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 220px);
    gap: 12px;

    grid-template-areas:
        "one two three"
        "four two five"
        "six six seven";
}

.gallery img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    border: 2px solid white; /* Borde blanco */
    border-radius: 12px;
    transition: .3s;
    cursor: pointer;
}

.gallery img:hover{
    transform: scale(1.03);
}

.one{
    grid-area: one;
}

.two{
    grid-area: two;
}

.three{
    grid-area: three;
}

.four{
    grid-area: four;
}

.five{
    grid-area: five;
}

.six{
    grid-area: six;
}

.seven{
    grid-area: seven;
}
        </style>
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>03-CSS</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
</head>

<body>

    <a href="/03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256">
            <path
                d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z">
            </path>
        </svg>
    </a>

    <main>
        <header>
            <h1>45-Challenge: Grid</h1>
            <h2>Irregular Gallery</h2>
        </header>

        <section class="gallery">

            <img src="imgs/grid/ani01.png" alt="Imagen 1" class="one">
            <img src="imgs/grid/ani02.png" alt="Imagen 2" class="two">
            <img src="imgs/grid/ani03.png" alt="Imagen 3" class="three">
            <img src="imgs/grid/ani04.png" alt="Imagen 4" class="four">
            <img src="imgs/grid/ani05.png" alt="Imagen 5" class="five">
            <img src="imgs/grid/ani06.png" alt="Imagen 6" class="six">
            <img src="imgs/grid/ani07.png" alt="Imagen 7" class="seven">

        </section>
    </main>

</body>

</html>
