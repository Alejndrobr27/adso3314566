<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>03-CSS</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
    <style>
        div {
            color: white;
            height: 70px;
            width: 70x;
            transition: all 0.4s ease-in;

            &:hover {
                cursor: pointer;
                transform: scale(1.1);
                box-shadow: 0 6px 30px rgb(163, 157, 201);
            }

        }
        h3 {
            color: white;
        }

        .box1 {
            background: rgb(156, 142, 218);
            width: 100px;
            height: 100px;
            border-radius: 140px 0 0 0;
            margin: 0 auto;
        }

        .box2 {
            background: rgb(156, 142, 218);
            width: 100px;
            height: 100px;
            border-radius: 0 140px 0 0;
            margin: 0 auto;
        }

        .box3 {
            background: rgb(156, 142, 218);
            width: 100px;
            height: 100px;
            border-radius: 0 0 140px 0;
            margin: 0 auto;
        }

        .box4 {
            background: rgb(156, 142, 218);
            width: 100px;
            height: 100px;
            border-radius: 0 0 0 140px;
            margin: 0 auto;
        }

        .box5 {
            background: rgb(156, 142, 218);
            width: 100px;
            height: 100px;
            border-radius: 140px;
            margin: 0 auto;
        }

        .box6 {
            background: rgb(156, 142, 218);
            width: 100px;
            height: 100px;
            border-radius: 140px 140px 0 0;
            margin: 0 auto;
        }
    </style>
</head>

            <h1>26-Border-Radius</h1>
            <h2>Property defines the radius of the element's corners.


            </h2>
        </header>
        <section>
            <h3>Border-Radius 140px 0 0 0</h3> <br>
            <div class="box1"></div> <br>
            <h3>Border-Radius 0 140px 0 0</h3> <br>
            <div class="box2"></div> <br>
            <h3>Border-Radius 0 0 140px 0</h3> <br>

            <h3>Border-Radius 0 0 0 140px</h3> <br>
