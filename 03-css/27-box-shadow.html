<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>03-CSS</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
    <style>
        h3 {
            color: white;
        }
        div.images img{
            all: unset;
            width: 200px;
        }

        div.box {
            margin: 1rem auto;
            height: 100px;
            width: 200px;
            background: rgb(129, 102, 194);
        }
        div.box1{
            box-shadow: 0 0 12px #fff;
        }
        div.box2{
            box-shadow: -10px -10px 24px 0 #fff;
        }
        div.box3{
            box-shadow: 0 0 20px #fff inset;
        }
        div.box4{
            box-shadow: 4px 4px 0 #d4c00a, 8px 8px 0 #0627bb, 12px 12px 0 #e70e0e;
        }

            div.images {
                display: flex;
                justify-content: center;
                margin-block: 2rem;
                gap: 1rem;
            }
            div.images img:first-child{
                box-shadow: 0 0 12px #fff;
            }
            div.images img:last-child{
                filter: drop-shadow(0 0 12px #fff);
            }
    </style>
</head>

<body>
    <a href="/03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256">
            <path
                d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z">
            </path>
        </svg>
    </a>
    <main>
        <header>
            <h1>27-Box-Shadow</h1>
            <h2>Property attaches one or more shadows to an element.


            </h2>
        </header>
        <section>
            <h3>Box-shadow: 0 0 12px #fff</h3>
            <div class="box box1"></div>
            <h3>Box-shadow: -10px -10px 24px 0 #fff</h3>
            <div class="box box2"></div>
            <h3>Box-shadow: 0 0 20px #fff inset</h3>
            <div class="box box3"></div>
            <h3>Box-shadow: multiple #fff</h3>
            <div class="box box4"></div>
            <h3>Box-shadow: VS drop-shadow()</h3>
            <div class="images">
                <img src="imgs/Crash.jpg" width="50" height="50" >
                <img src="imgs/Crash.jpg" width="50" height="50" >
            </div>
            
        </section>
