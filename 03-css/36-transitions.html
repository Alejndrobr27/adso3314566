<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>03-CSS</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
    <style>
        h3
        { color: aliceblue;}

        main section{
            img {
                border: none;
                border-radius: 0%;
                filter: drop-shadow(0 0 12px #fff);
            }
            img.transition01{
                transition: transform 1s ease-in;
                &:hover{
                    transform: scale(1.3);
                }
            }
            img.transition02{
                transition: transform 0.5s ease-out;
                &:hover{
                    transform: rotate(-180deg);
                }
            }
            img.transition03{
                transition: transform 0.5s ease-in;
                &:hover{
                    transform: rotate(180deg);
                }
            }
            img.transition04{
                transition: transform 0.5s linear;
                &:hover{
                    transform: translateX(100px);
                }
            }
            div.box{
                background-color: #fff;
                height: 80px;
                margin-block: 2rem;
                width: 80px;
                transition: width 1s,
                            height 1s 1s,
                            background-color 1s 2s;
                &:hover{
                    width: 300px;
                    height: 160px;
                    background-color: rgb(255, 0, 0);
                }
            }
        }
    </style>
</head>

<body>
    <a href="/03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256">
            <path
                d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z">
            </path>
        </svg>
    </a>
    <main>
        <header>
            <h1>36-Transitions</h1>
            <h2>Enable you to define the transition between two states of an element.


            </h2>
        </header>
        <section>
            <h3>Scale (1-4)</h3>
            <img src="imgs/dk.png" alt="DK" class="transition01">
            <h3>Rotate (-180deg)</h3>
            <img src="imgs/dk.png" alt="DK" class="transition02">
            <h3>RotateY(180deg)</h3>
            <img src="imgs/dk.png" alt="DK" class="transition03">
            <h3>RotateX(100PX)</h3>
            <img src="imgs/dk.png" alt="DK" class="transition04">
            <h3>Multiple</h3>
            <div class="box"></div>
        </section>
