<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>13-Box-Model</title>

    <link rel="stylesheet" href="../src/css/03-css.css">

    <style>
        .box1 {
            width: 300px;
            height: 300px;
            background-color: #510584;
            margin: 3rem auto;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 4px solid #000;
        }

        .box-content {
            font-size: 2rem;
            font-weight: bold;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h2 {
            text-align: center;
        }
    </style>
</head>

<body>

    <a href="/03-css/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256">
            <path
                d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z">
            </path>
        </svg>
    </a>

    <main>

        <header>
            <h1>13-Box-Model</h1>
            <h2>Is essentially a box that wraps around every html element.</h2>
        </header>

        <section>
            <div class="box1">
                <div class="box-content">
                    <span>CAJA</span>
                    <span>📦</span>
                </div>
            </div>
        </section>

    </main>
