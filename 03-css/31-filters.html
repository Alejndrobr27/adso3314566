<!DOCTYPE html>
<html lang="en">
<style>
    h3 {
        color: white;
    }

    .creed {
        background: url(imgs/creed.png) no-repeat center / contain;
        width: 300px;
        height: 300px;
        margin: 20px auto;
        transition: filter 0.5s ease;
        border: none;
        
    }


    .blur:hover,
    .grayscale:hover,
    .sepia:hover,
    .saturate:hover,
    .invert:hover {
        filter: none;
    }

    .brightness:hover,
    .contrast:hover {
        filter: none;
    }



    .normal {
        filter: none;
    }

    .blur {
        filter: blur(4px);
    }

    .grayscale {
        filter: grayscale(100%);
    }

    .sepia {
        filter: sepia(100%);
    }

    .saturate {
        filter: saturate(300%);
    }

    .invert {
        filter: invert(100%);
    }

    .brightness {
        filter: brightness(180%);
    }

    .contrast {
        filter: contrast(250%);
    }
</style>
