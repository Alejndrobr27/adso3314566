<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>00-Title</title>
    <link rel="stylesheet" href="../src/css/02-html.css">
</head>
<style>
    body {
        font-family: Arial, sans-serif;
    }

    /* contenedor */
    .contenedor {
        width: 600px;
        margin: 40px auto;
        background: #e5e5e5;
        padding: 5px;
        border-radius: 10px;
    }

    /* todos los bloques */
    header, nav, article, section, aside, footer {
        background: #682600;
        color: #ddd;
        text-align: center;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 10px;
    }

    .contenido {
        display: flex;
        gap: 10px;
    }

    article {
        flex: 2;
        display: flex;
        flex-direction: column;
        gap: px;
    }

    section {
        background: #aa3101;
        padding: 30px;
    }

    aside {
        flex: 1;
    }
</style>
<body>
    <a href="/02-html/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000"
            viewBox="0 0 256 256">
            <path
                d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z">
            </path>
        </svg>
    </a>
    
    <main>
        <header>
            <h1>16-Semantic</h1> <br>
            <h2>Defines layout with semantic tags (new style).</h2>
        </header>
    <section>
        <h3>Structure</h3>
        <p>The &lt;div&gt; element is used to group HTML elements together and apply styles to them.</p>
        <div class="contenedor">
            <header>&lt;header&gt;</header>
            <nav>&lt;nav&gt;</nav>

            <main class="contenido">
                <article>
                    &lt;article&gt;
                    <section>&lt;section&gt;</section>
                </article>

                <aside>&lt;aside&gt;</aside>
            </main>

            <footer>&lt;footer&gt;</footer>
    </div>
    </section>
    </main>
</body>
</html>
