<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>13-Audio</title>
    <link rel="stylesheet" href="../src/css/02-html.css">
    <style>
        main {
            max-width: 600px;
            margin: auto;
            padding: 20px;
            font-family: sans-serif;
        }
        audio {
            display: block;
            margin: 20px auto;
            width: 100%;
        }
    </style>
</head>
<body>
    <a href="/02-html/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256">
            <path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"></path>
        </svg>
    </a>
    <main>
        <header>
            <h1>13-Audio</h1>
            <h2>Inserts audio files.</h2>
        </header>
        <section>
            <audio id="myAudio" controls>
                <source src="/src/audio/sena.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
            <p style="text-align:center;">Haz clic en cualquier parte para escuchar el audio .</p>
        </section>
    </main>

    <script>
        const audio = document.getElementById('myAudio');

        // Escuchar clic en cualquier parte del documento
        document.addEventListener('click', () => {
            setTimeout(() => {
                audio.play().catch(err => console.log('No se pudo reproducir:', err));
            }, 5000); // 5000 ms = 5 segundos
        }, { once: true }); // solo necesita un clic
    </script>
</body>
</html>
