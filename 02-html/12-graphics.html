<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12-Graphics</title>
    <link rel="stylesheet" href="../src/css/02-html.css">
</head>

<body>
    <a href="/02-html/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256">
            <path d="M224,128a8,8,0,0,1-8,8H59.31l58.35,58.34a8,8,0,0,1-11.32,11.32l-72-72a8,8,0,0,1,0-11.32l72-72a8,8,0,0,1,11.32,11.32L59.31,120H216A8,8,0,0,1,224,128Z"></path>
        </svg>
    </a>
    <main>
        <header>
            <h1>12-Graphics</h1>
            <h2>Creates inline graphics with tags.</h2>
        </header>
        <section>
            <section>
                <h3>Gráfico con Canvas (barra simple)</h3>
                <canvas id="canvasChart" width="400" height="200" style="border:1px solid #ccc;"></canvas>

                <h3>Gráfico con SVG (círculos y líneas)</h3>

<svg width="400" height="200" style="border:1px solid #ccc;">
    <!-- Polyline para línea -->
    <polyline points="50,150 150,100 250,75 350,50" fill="none" stroke="blue" stroke-width="2"/>
    
    <!-- Círculos en cada punto -->
    <circle cx="50" cy="150" r="5" fill="red" />
    <circle cx="150" cy="100" r="5" fill="red" />
    <circle cx="250" cy="75" r="5" fill="red" />
    <circle cx="350" cy="50" r="5" fill="red" />

    <!-- Texto debajo de cada punto -->
    <text x="50" y="165" font-size="12" text-anchor="middle">A</text>
    <text x="150" y="115" font-size="12" text-anchor="middle">B</text>
    <text x="250" y="90" font-size="12" text-anchor="middle">C</text>
    <text x="350" y="65" font-size="12" text-anchor="middle">D</text>
</svg>
            </section>

            <script>
                const canvas = document.getElementById('canvasChart');
                const ctx = canvas.getContext('2d');

                const data = [50, 80, 100, 60, 120]; // alturas de barras
                const barWidth = 40;
                const gap = 20;
                const offsetX = 50; // margen para eje
                const offsetY = 10; // margen superior

                // Dibujar barras y valores
                ctx.fillStyle = 'teal';
                data.forEach((value, index) => {
                    const x = offsetX + index * (barWidth + gap);
                    const y = canvas.height - value - offsetY;
                    ctx.fillRect(x, y, barWidth, value);

                    // valor encima de la barra
                    ctx.fillStyle = '#000';
                    ctx.font = '12px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(value, x + barWidth / 2, y - 5);

                    ctx.fillStyle = 'teal'; // volver al color de barras
                });

                // Ejes
                ctx.strokeStyle = '#000';
                ctx.beginPath();
                ctx.moveTo(offsetX, 0);
                ctx.lineTo(offsetX, canvas.height);
                ctx.lineTo(canvas.width, canvas.height);
                ctx.stroke();
            </script>
        </section>
    </main>
</body>

</html>
